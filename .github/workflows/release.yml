name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create (e.g. v1.0.0)"
        required: true
        type: string
      title:
        description: "Release title (defaults to the tag)"
        required: false
        type: string
      notes:
        description: "Release notes (Markdown)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          TITLE: ${{ inputs.title }}
          NOTES: ${{ inputs.notes }}
        run: |
          gh release create "$TAG" laserstorm-force-builder.html \
            --repo "$GITHUB_REPOSITORY" \
            --target main \
            --title "${TITLE:-$TAG}" \
            --notes "$NOTES"
