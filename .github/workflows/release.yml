name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create (e.g. v1.0.0)"
        required: true
        type: string
      title:
        description: "Release title (defaults to the tag)"
        required: false
        type: string
      notes:
        description: "Release notes (Markdown)"
        required: false
        type: string
  push:
    paths:
      - ".github/release-request.json"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release parameters
        id: params
        env:
          IN_TAG: ${{ inputs.tag }}
          IN_TITLE: ${{ inputs.title }}
          IN_NOTES: ${{ inputs.notes }}
        run: |
          if [ -n "$IN_TAG" ]; then
            TAG="$IN_TAG"
            TITLE="${IN_TITLE:-$IN_TAG}"
            printf '%s' "$IN_NOTES" > /tmp/notes.md
          else
            TAG=$(jq -r .tag .github/release-request.json)
            TITLE=$(jq -r '.title // .tag' .github/release-request.json)
            cp .github/release-notes.md /tmp/notes.md 2>/dev/null || : > /tmp/notes.md
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Fetch app file from main
        run: |
          git fetch origin main
          git show FETCH_HEAD:laserstorm-force-builder.html > laserstorm-force-builder.html

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.params.outputs.tag }}
          TITLE: ${{ steps.params.outputs.title }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; nothing to do."
            exit 0
          fi
          gh release create "$TAG" laserstorm-force-builder.html \
            --repo "$GITHUB_REPOSITORY" \
            --target main \
            --title "$TITLE" \
            --notes-file /tmp/notes.md
